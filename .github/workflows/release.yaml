name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build and Push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4
        id: buildx

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get OpenCode Version
        id: version
        run: |
          VERSION=$(grep -oP 'ARG OPENCODE_VERSION=\K[0-9]+\.[0-9]+\.[0-9]+' Dockerfile)
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "Extracted version: ${VERSION}"

      - name: Get latest tag version
        id: tag-version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [[ -n "$LATEST_TAG" ]]; then
            TAG_VERSION=${LATEST_TAG#v}
            echo "TAG_VERSION=${TAG_VERSION}" >> $GITHUB_OUTPUT
            echo "Latest tag: v${TAG_VERSION}"
          else
            echo "TAG_VERSION=" >> $GITHUB_OUTPUT
            echo "No tags found"
          fi

      - name: Check if version changed
        id: check
        run: |
          if [[ "${{ steps.version.outputs.VERSION }}" == "${{ steps.tag-version.outputs.TAG_VERSION }}" ]]; then
            echo "VERSION_CHANGED=false" >> $GITHUB_OUTPUT
            echo "Version unchanged, skipping release"
          else
            echo "VERSION_CHANGED=true" >> $GITHUB_OUTPUT
            echo "Version changed from ${{ steps.tag-version.outputs.TAG_VERSION }} to ${{ steps.version.outputs.VERSION }}"
          fi

      - name: Create tag
        if: steps.check.outputs.VERSION_CHANGED == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "v${{ steps.version.outputs.VERSION }}"
          git push origin "v${{ steps.version.outputs.VERSION }}" --force

      - name: Publish Docker image
        if: steps.check.outputs.VERSION_CHANGED == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          builder: ${{ steps.buildx.outputs.name }}
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/opencode:v${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/opencode:latest
          labels: |
            org.opencontainers.image.title=${{ github.event.repository.name }}
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Create GitHub Release
        if: steps.check.outputs.VERSION_CHANGED == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          replace_existing_release: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
